<div class="login-wrapper">

  <!-- LOGIN CARD -->
  <div class="login-card">

    <!-- BRAND -->
    <div class="brand">

      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none">

          <circle
            cx="20"
            cy="20"
            r="19"
            stroke="url(#g1)"
            stroke-width="2"/>

          <path
            d="M12 20L18 26L28 14"
            stroke="url(#g2)"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>

          <defs>

            <linearGradient id="g1">
              <stop stop-color="#0ea5e9"/>
              <stop offset="1" stop-color="#7c3aed"/>
            </linearGradient>

            <linearGradient id="g2">
              <stop stop-color="#0ea5e9"/>
              <stop offset="1" stop-color="#7c3aed"/>
            </linearGradient>

          </defs>

        </svg>
      </div>

      <div class="brand-text">
        <span class="brand-name">ESS</span>

        <span class="brand-sub">
          EQUIPMENT SAFETY SUITE
        </span>
      </div>

    </div>

    <!-- TITLE -->
    <h1 class="login-title">
      Welcome Back
    </h1>

    <p class="login-subtitle">
      Sign in to your admin dashboard
    </p>

    <!-- ERROR -->
    <div class="alert-error" *ngIf="error">
      {{ error }}
    </div>

    <!-- FORM -->
    <form
      [formGroup]="form"
      (ngSubmit)="submit()">

      <!-- EMAIL -->
      <div class="field">

        <label>Email Address</label>

        <div class="input-wrap">

          <svg
            class="input-icon"
            viewBox="0 0 20 20"
            fill="none">

            <path
              d="M2.5 5.5L10 10.5L17.5 5.5"
              stroke="currentColor"/>

          </svg>

          <input
            type="email"
            formControlName="emailId"
            placeholder="admin@company.com">

        </div>

      </div>

      <!-- PASSWORD -->
      <div class="field">

        <label>Password</label>

        <div class="input-wrap">

          <svg
            class="input-icon"
            viewBox="0 0 20 20"
            fill="none">

            <rect
              x="3"
              y="8"
              width="14"
              height="9"
              rx="2"
              stroke="currentColor"/>

          </svg>

          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter password">

          <button
            type="button"
            class="toggle-pw"
            (click)="togglePassword()">

            👁

          </button>

        </div>

      </div>

      <!-- BUTTON -->
      <button
        class="btn-login"
        type="submit"
        [disabled]="loading">

        <span *ngIf="!loading">
          SIGN IN →
        </span>

        <span *ngIf="loading">
          Signing in...
        </span>

      </button>

    </form>

    <!-- FOOTER -->
    <p class="footer-note">
      ESS Admin Portal ©2026
    </p>

  </div>

</div>
