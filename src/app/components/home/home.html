<!-- home.html — ESS Admin Layout -->

<div class="shell">


  <!-- MOBILE OVERLAY -->
  <div
    class="overlay"
    [class.visible]="mobileOpen"
    (click)="closeMobile()">
  </div>



  <!-- SIDEBAR -->
  <aside
    class="sidebar"
    [class.sidebar--collapsed]="!sidebarOpen"
    [class.sidebar--mobile-open]="mobileOpen">


    <!-- BRAND -->
    <!-- BRAND -->
<div class="sb-brand">

  <div class="sb-brand__mark">
    <img src="/bg_logo.png" alt="ESS Logo">
  </div>


  <div class="sb-brand__text">

    <span class="sb-brand__name">
      ESS Admin
    </span>

    <span class="sb-brand__tag">
      Control Panel
    </span>

  </div>

</div>




    <!-- MENU TITLE -->

    <div class="sb-section-label">

      <!-- Modules -->

    </div>

   <!-- NAVIGATION -->

    <nav class="sb-nav">
      <a
      *ngFor="let item of navItems; trackBy:trackByPath"
      [routerLink]="item.path"
      class="nav-link"
      [class.nav-link--active]="isActive(item.path,item.exact)">

        <span class="nav-link__bar"></span>

        <i class="ti {{item.icon}}"></i>


        <span class="nav-link__label">

          {{item.label}}

        </span>

      </a>

    </nav>

    <div class="sb-divider"></div>

    <!-- PROFILE -->

    <div class="sb-profile">

      <div class="sb-profile__avatar">

        {{admin?.name?.charAt(0)?.toUpperCase() || 'A'}}

        <span class="sb-profile__status"></span>

      </div>

      <div class="sb-profile__info">

        <p class="sb-profile__name">

          {{admin?.name || 'Admin'}}

        </p>
        <p class="sb-profile__role">

          {{admin?.role || 'Super Admin'}}

        </p>
      </div>
    </div>







    <!-- LOGOUT -->

    <button
    class="sb-logout"
    (click)="logout()">



      <i class="ti ti-logout"></i>


      <span>
        Sign out
      </span>



    </button>



  </aside>









  <!-- MAIN -->

  <div class="main">





    <!-- HEADER -->

    <header class="topbar">



      <!-- Mobile button -->

      <button
      class="topbar__btn topbar__btn--mobile"
      (click)="toggleMobile()">



        <i class="ti ti-menu-2"></i>



      </button>






      <!-- Desktop collapse -->

      <button
      class="topbar__btn topbar__btn--desktop"
      (click)="toggleSidebar()">



    <img 
 src="/burger_icon.png"
 class="hamburger-img"
 alt="menu">


      </button>







      <!-- Breadcrumb -->


      <div class="topbar__breadcrumb">


        <span class="topbar__crumb-root">

          ESS

        </span>



        <i class="ti ti-chevron-right"></i>



        <span class="topbar__crumb-current">

          Dashboard

        </span>



      </div>








      <div class="topbar__spacer"></div>







      <!-- LIVE -->


      <div class="topbar__live">


        <span class="topbar__live-dot"></span>


        Live


      </div>







      <!-- CLOCK -->


      <time class="topbar__clock">


        {{currentTime | date:'HH:mm:ss'}}


      </time>







      <!-- NOTIFICATION -->


      <button class="topbar__btn">


        <i class="ti ti-bell"></i>


      </button>








      <!-- REFRESH -->


      <button
      class="topbar__btn"
      (click)="loadCompanies()">



        <i class="ti ti-refresh"></i>



      </button>








      <!-- USER -->


      <div class="topbar__avatar">


        {{admin?.name?.charAt(0)?.toUpperCase() || 'A'}}


      </div>





    </header>









    <!-- CHILD ROUTES -->

    <main class="content">





      <!-- Loading -->

      <div
      class="load-strip"
      [class.load-strip--active]="loading">


        <div class="load-strip__fill"></div>


      </div>






      <!-- HERE DASHBOARD / COMPANY PAGE LOADS -->


      <router-outlet></router-outlet>




    </main>





  </div>





</div>
